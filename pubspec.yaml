name: tailor_app
description: "Darzi — Tailor Shop Management App"
publish_to: 'none'

version: 1.0.0+4

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  equatable: ^2.0.7

  # Local Database (offline-first cache)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Backend
  supabase_flutter: ^2.9.1

  # System & Utilities
  path_provider: ^2.1.6
  url_launcher: ^6.3.2
  mailer: ^6.3.1
  image_picker: ^1.1.2
  iconsax_flutter: ^1.0.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - .env.example
    - assets/fonts/
  fonts:
    - family: BricolageGrotesque
      fonts:
        - asset: assets/fonts/BricolageGrotesque-Variable.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoNastaliqUrdu-Bold.ttf
          weight: 700
